<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Display data insertion</title>
    </head>
    <body>
        <table>
            <tr>
                <th>title</th>
                <th>Episode NB</th>
                <th>Opening_crawl</th>
                <th>Director</th>
                <th>Producer</th>
                <th>Release_date</th>
            </tr>
            {% for movie in movies %}
            <tr>
                <td>{{ movie.title }}</td>
                <td>{{ movie.episode_nb }}</td>
                <td>{{ movie.opening_crawl }}</td>
                <td>{{ movie.director }}</td>
                <td>{{ movie.producer }}</td>
                <td>{{ movie.release_date }}</td>
            </tr>
            {% endfor %}
        </table>
    </body>
</html>
