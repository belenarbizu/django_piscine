<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fifty shades of bic</title>
        <style>
            table {
                border-collapse: collapse;
            }

            th, td {
                border: 1px solid black;
                padding: 8px;
                text-align: center;
                height: 40px;
                width: 80px;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>Noir</th>
                <th>Rouge</th>
                <th>Bleu</th>
                <th>Vert</th>
            </tr>
            {% for color in colors %}
            <tr>
                {% for shade in color %}
                <td style="background-color: rgb{{ shade }}"></td>
                {% endfor %}
            </tr>
            {% endfor %}
    </body>
</html>
